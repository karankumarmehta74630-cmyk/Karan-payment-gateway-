<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f1f3f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#fff;
width:350px;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.logo{
width:60px;
height:60px;
border-radius:50%;
background:#1e40af;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
margin:auto;
}

h2{text-align:center;margin-top:10px}

input{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-bottom:1px solid #ccc;
outline:none;
}

.row{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:10px;
}

.btn{
width:100%;
padding:10px;
margin-top:15px;
border:none;
background:#1e40af;
color:#fff;
border-radius:5px;
cursor:pointer;
transition:.3s;
}

.btn:active{transform:scale(.95)}

.social{
margin-top:15px;
}

.social button{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ccc;
background:#fff;
border-radius:5px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
cursor:pointer;
transition:.3s;
}

.social button:active{transform:scale(.95)}

.social img{width:20px}

.link{
text-align:center;
margin-top:10px;
font-size:13px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="card">

<div class="logo">KP</div>

<h2>Sign in</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<div class="row">
<span></span>
<span onclick="window.location='forgot.html'">Forgot Password?</span>
</div>

<button class="btn" onclick="login()">SIGN IN</button>

<div class="social">
<button onclick="googleLogin()">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
Continue with Google
</button>

<button onclick="facebookLogin()">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png">
Continue with Facebook
</button>
</div>

<div class="link" onclick="window.location='signup.html'">
Don't have an account? Create account
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
  authDomain: "karanchatapp-e0b1d.firebaseapp.com",
  projectId: "karanchatapp-e0b1d",
  appId: "1:992252113506:web:c55091651550918a43173b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login=function(){
signInWithEmailAndPassword(auth,email.value,password.value)
.then(()=>window.location="index.html")
.catch(e=>alert(e.message));
}

window.googleLogin=function(){
const provider=new GoogleAuthProvider();
signInWithPopup(auth,provider)
.then(()=>window.location="index.html");
}

window.facebookLogin=function(){
alert("Enable Facebook login in Firebase");
}

</script>

</body>
</html>
