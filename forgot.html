<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Settings</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Roboto}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#e0e7ff,#f1f5f9);
}

.card{
width:380px;
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.logo{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(135deg,#2563eb,#9333ea);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:10px;
font-weight:600;
}

h2{margin-bottom:15px}

.tab{
display:flex;
gap:5px;
margin-bottom:15px;
}

.tab button{
flex:1;
padding:8px;
border:none;
background:#e5e7eb;
cursor:pointer;
border-radius:5px;
}

.active{
background:#2563eb !important;
color:#fff;
}

.input-group{
margin-bottom:15px;
text-align:left;
}

input{
width:100%;
padding:10px;
border:none;
border-bottom:1px solid #ccc;
outline:none;
}

button.main{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.loader{
display:none;
font-size:13px;
margin-top:10px;
}

</style>
</head>
<body>

<div class="card">

<div class="logo">KP</div>
<h2>Account Settings</h2>

<div class="tab">
<button id="tab1" class="active" onclick="switchTab(1)">Forgot Password</button>
<button id="tab2" onclick="switchTab(2)">Change Email</button>
</div>

<!-- Forgot Password -->
<div id="forgotBox">

<div class="input-group">
<input type="email" id="resetEmail" placeholder="Enter your email">
</div>

<button class="main" onclick="resetPassword()">Send Reset Link</button>

</div>

<!-- Change Email -->
<div id="emailBox" style="display:none">

<div class="input-group">
<input type="email" id="oldEmail" placeholder="Old Email">
</div>

<div class="input-group">
<input type="email" id="newEmail" placeholder="New Email">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
</div>

<button class="main" onclick="changeEmail()">Update Email</button>

</div>

<div class="loader" id="loader">Processing...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, sendPasswordResetEmail, EmailAuthProvider, reauthenticateWithCredential, updateEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
  authDomain: "karanchatapp-e0b1d.firebaseapp.com",
  projectId: "karanchatapp-e0b1d",
  appId: "1:992252113506:web:c55091651550918a43173b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function showLoader(show){
document.getElementById("loader").style.display=show?"block":"none";
}

window.switchTab=function(tab){
document.getElementById("tab1").classList.remove("active");
document.getElementById("tab2").classList.remove("active");

if(tab==1){
document.getElementById("forgotBox").style.display="block";
document.getElementById("emailBox").style.display="none";
document.getElementById("tab1").classList.add("active");
}else{
document.getElementById("forgotBox").style.display="none";
document.getElementById("emailBox").style.display="block";
document.getElementById("tab2").classList.add("active");
}
}

window.resetPassword=function(){
if(!resetEmail.value){
alert("Enter email");
return;
}
showLoader(true);

sendPasswordResetEmail(auth,resetEmail.value)
.then(()=>alert("Reset link sent"))
.catch(err=>alert(err.message))
.finally(()=>showLoader(false));
}

window.changeEmail=async function(){

let user=auth.currentUser;

if(!user){
alert("Login first");
return;
}

try{
showLoader(true);

const cred=EmailAuthProvider.credential(oldEmail.value,password.value);

await reauthenticateWithCredential(user,cred);
await updateEmail(user,newEmail.value);

alert("Email updated successfully");

}catch(err){
alert(err.message);
}finally{
showLoader(false);
}
}

</script>

</body>
</html>
