<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan Payment Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a);
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
color:#fff;
}

.container{max-width:450px;width:100%}

.card{
background:#ffffff10;
backdrop-filter:blur(20px);
border-radius:20px;
padding:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
animation:fade .6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.header{
text-align:center;
font-weight:600;
margin-bottom:15px;
font-size:18px;
}

.profile{
background:#ffffff20;
padding:12px;
border-radius:12px;
margin-bottom:15px;
font-size:13px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#6366f1;
color:#fff;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{transform:scale(1.05)}

#qrSection{
display:none;
text-align:center;
margin-top:15px;
animation:slide .5s ease;
}

@keyframes slide{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.timer{
color:#ff4d4d;
font-weight:600;
margin-top:8px;
}

.upi{
display:flex;
justify-content:space-around;
margin-top:10px;
}

.upi img{
width:55px;
background:#fff;
padding:8px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.upi img:hover{transform:scale(1.1)}

.logout{
background:#ef4444;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="header">Karan Payment Gateway</div>

<div class="profile" id="profileBox">
Loading profile...
</div>

<input type="number" id="amount" placeholder="Enter Amount ₹">

<button onclick="startPayment()">Generate Payment QR</button>

<div id="qrSection">

<div id="qrcode"></div>

<p id="orderText"></p>
<p id="amountText"></p>
<p class="timer" id="timer"></p>

<div class="upi">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Google_Pay_Logo.svg" onclick="openUPI()">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/16/PhonePe_logo.svg" onclick="openUPI()">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/39/Paytm_logo.png" onclick="openUPI()">
</div>

<button onclick="downloadQR()">Download QR</button>
<button onclick="shareQR()">Share Payment</button>

</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
  authDomain: "karanchatapp-e0b1d.firebaseapp.com",
  projectId: "karanchatapp-e0b1d",
  appId: "1:992252113506:web:c55091651550918a43173b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let orderId="", amountVal="", timer, timeLeft=60;
let upiLink="";
let baseURL=window.location.origin+window.location.pathname;

onAuthStateChanged(auth,user=>{
if(!user){
window.location.href="login.html";
}else{
document.getElementById("profileBox").innerHTML=
"<b>Name:</b> "+(user.displayName||"User")+"<br>"+
"<b>Email:</b> "+user.email;
}
});

window.logout=function(){
signOut(auth).then(()=>window.location.href="login.html");
}

window.startPayment=function(){

let amt=document.getElementById("amount").value;

if(!amt || amt<=0){
alert("Enter valid amount");
return;
}

amountVal=amt;
orderId="ORD"+Date.now();

document.getElementById("qrSection").style.display="block";

document.getElementById("orderText").innerText="Order ID: "+orderId;
document.getElementById("amountText").innerText="Amount: ₹"+amt;

let websiteQR=baseURL+"?amount="+amt;

document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),{
text:websiteQR,
width:200,
height:200
});

upiLink="upi://pay?pa=7463011305-14@ybl&pn=Karan&am="+amt+"&cu=INR&tn=Order "+orderId;

startTimer();
}

function startTimer(){
timeLeft=60;
updateTimer();

clearInterval(timer);

timer=setInterval(()=>{
timeLeft--;
updateTimer();

if(timeLeft<=0){
clearInterval(timer);
document.getElementById("timer").innerText="Expired";
}
},1000);
}

function updateTimer(){
document.getElementById("timer").innerText="Expires in "+timeLeft+" sec";
}

window.openUPI=function(){
window.location.href=upiLink;
}

window.downloadQR=function(){
let canvas=document.querySelector("#qrcode canvas");
let link=document.createElement("a");
link.href=canvas.toDataURL();
link.download="QR_"+orderId+".png";
link.click();
}

window.shareQR=async function(){

let canvas=document.querySelector("#qrcode canvas");
let blob=await new Promise(r=>canvas.toBlob(r));
let file=new File([blob],"QR.png",{type:"image/png"});

let shareURL=baseURL+"?amount="+amountVal;

let text=
"Karan Payment\n"+
"Order: "+orderId+"\n"+
"Amount: ₹"+amountVal+"\n"+
shareURL;

if(navigator.canShare && navigator.canShare({files:[file]})){
navigator.share({text:text,files:[file]});
}else{
window.open("https://wa.me/?text="+encodeURIComponent(text));
}
}

</script>

</body>
</html>
