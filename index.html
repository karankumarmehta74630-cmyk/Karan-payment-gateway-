<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan FinTech</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

/* 🌈 Background */
body{
background:linear-gradient(135deg,#e0e7ff,#d1fae5);
padding-bottom:80px;
}

/* 🔥 Header */
.header{
padding:15px;
font-size:18px;
font-weight:600;
}

/* 📦 Card */
.card{
background:#fff;
margin:12px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* 👤 Profile */
.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:50px;
height:50px;
border-radius:50%;
}

/* Inputs */
input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* Buttons */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
font-size:14px;
}

/* QR */
#qrcode{
display:flex;
justify-content:center;
margin-top:10px;
}
.timer{color:red;text-align:center;margin-top:5px}

/* Bottom Nav */
.nav{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -5px 15px rgba(0,0,0,0.1);
}

.nav div{
text-align:center;
font-size:12px;
cursor:pointer;
}

/* Sections */
.section{display:none}
.active{display:block}

/* Success */
.success{text-align:center}
.check{
font-size:50px;
color:green;
}
</style>
</head>
<body>

<div class="header">Karan FinTech</div>

<!-- PROFILE -->
<div id="profile" class="section active">
<div class="card">

<div class="profile" id="profileBox"></div>

<input id="name" placeholder="Update Name">
<button onclick="updateProfile()">Update Profile</button>

</div>
</div>

<!-- PAYMENT -->
<div id="payment" class="section">
<div class="card">

<h3>Payment</h3>

<input id="amount" placeholder="Enter Amount ₹">

<button onclick="generateQR()">Generate QR</button>

<div id="qrcode"></div>
<p id="order" style="text-align:center"></p>
<p id="timer" class="timer"></p>

<button id="payBtn" onclick="payNow()">Pay Now</button>
<button id="regenBtn" style="display:none" onclick="generateQR()">Regenerate</button>

</div>
</div>

<!-- EMAIL -->
<div id="email" class="section">
<div class="card">

<h3>Change Gmail</h3>

<input id="newEmail" placeholder="New Email">
<input id="password" placeholder="Password">

<button onclick="changeEmail()">Update Email</button>

</div>
</div>

<!-- SUCCESS -->
<div id="success" class="section">
<div class="card success">

<div class="check">✔</div>
<h3>Payment Success</h3>
<p id="successText"></p>

<button onclick="show('payment')">Back</button>

</div>
</div>

<!-- 🔻 Bottom Nav -->
<div class="nav">
<div onclick="show('profile')">👤<br>Profile</div>
<div onclick="show('payment')">💳<br>Pay</div>
<div onclick="show('email')">📧<br>Email</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, updateProfile, EmailAuthProvider, reauthenticateWithCredential, verifyBeforeUpdateEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
authDomain:"karanchatapp-e0b1d.firebaseapp.com",
projectId:"karanchatapp-e0b1d"
});

const auth=getAuth(app);

let upiLink="", timer, time=60, orderId="";

/* Section */
window.show=id=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* Auth */
onAuthStateChanged(auth,user=>{
if(!user) location="login.html";
else{
profileBox.innerHTML=`
<img src="${user.photoURL}">
<div><b>${user.displayName}</b><br>${user.email}</div>`;
name.value=user.displayName||"";
}
});

/* Profile */
window.updateProfile=()=>updateProfile(auth.currentUser,{displayName:name.value});

/* Payment */
window.generateQR=()=>{
let amt=amount.value;
if(!amt)return alert("Enter amount");

orderId="ORD"+Math.floor(Math.random()*9999999);

upiLink=`upi://pay?pa=7463011305-14@ybl&pn=Karan&am=${amt}&cu=INR`;

qrcode.innerHTML="";
new QRCode(qrcode,{text:upiLink,width:180,height:180});

order.innerText="Order: "+orderId;

payBtn.disabled=false;
regenBtn.style.display="none";

startTimer();
}

function startTimer(){
time=60;
clearInterval(timer);

timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="Expires in "+time+" sec";

if(time<=0){
clearInterval(timer);
timer.innerText="Expired";
payBtn.disabled=true;
regenBtn.style.display="block";
}
},1000);
}

window.payNow=()=>{
show("success");
successText.innerText="Order "+orderId+" Paid";
}

/* Email */
window.changeEmail=async()=>{
let user=auth.currentUser;
const cred=EmailAuthProvider.credential(user.email,password.value);
await reauthenticateWithCredential(user,cred);
await verifyBeforeUpdateEmail(user,newEmail.value);
alert("Verification sent");
}

</script>
</body>
</html>
