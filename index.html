<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan Payment Gateway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

/* Background */
body{
display:flex;
min-height:100vh;
background:linear-gradient(135deg,#1e3a8a,#9333ea);
color:#fff;
}

/* Sidebar */
.sidebar{
width:220px;
background:#0f172a;
padding:20px;
}
.sidebar div{margin:15px 0;cursor:pointer}

/* Mobile */
@media(max-width:768px){
body{flex-direction:column}
.sidebar{display:flex;justify-content:space-around;width:100%}
}

/* Content */
.content{flex:1;padding:20px;display:flex;justify-content:center}

/* Card */
.card{
background:#ffffff15;
backdrop-filter:blur(20px);
padding:20px;
border-radius:15px;
max-width:420px;
width:100%;
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* Input */
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

/* Button */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#6366f1;
color:#fff;
cursor:pointer;
transition:.3s;
}
button:hover{transform:scale(1.05)}

/* Loader */
.loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000c;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
display:none;
}

/* Logo Loader */
.loader img{
width:80px;
animation:spin 2s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* Sections */
.section{display:none}
.active{display:block}

.timer{color:#ff4d4d;margin-top:5px}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
<img src="https://cdn-icons-png.flaticon.com/512/891/891419.png">
<p>Karan Payment Gateway</p>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<div onclick="show('payment')">Payment</div>
<div onclick="show('history')">History</div>
<div onclick="show('profile')">Profile</div>
<div onclick="show('email')">Change Gmail</div>
<div onclick="logout()">Logout</div>
</div>

<div class="content">

<!-- PAYMENT -->
<div id="payment" class="section active">
<div class="card">

<h3>Karan Payment Gateway</h3>

<div id="profileBox"></div>

<input id="amount" placeholder="Enter Amount">

<button onclick="generatePayment()">Generate Payment</button>

<div id="qrcode"></div>
<p id="orderText"></p>
<p id="timer" class="timer"></p>

<button onclick="payNow()">Pay Now</button>

<input id="utr" placeholder="Enter UTR">
<button onclick="verifyUTR()">Verify Payment</button>

<button onclick="downloadReceipt()">Download Receipt</button>

</div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<div class="card">
<h3>History</h3>
<div id="historyList"></div>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
<div class="card">
<h3>Profile</h3>
<div id="profileFull"></div>
</div>
</div>

<!-- EMAIL -->
<div id="email" class="section">
<div class="card">
<h3>Change Gmail</h3>
<input id="newEmail" placeholder="New Email">
<input id="password" placeholder="Password">
<button onclick="changeEmail()">Update</button>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, EmailAuthProvider, reauthenticateWithCredential, verifyBeforeUpdateEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
authDomain:"karanchatapp-e0b1d.firebaseapp.com",
projectId:"karanchatapp-e0b1d",
appId:"1:992252113506:web:c55091651550918a43173b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let isGuest=false, used=false, verified=false;
let upiLink="", orderId="", timer;

/* Loader random */
function showLoader(){
loader.style.display="flex";
let delay=Math.random()*2000+1000;
setTimeout(()=>loader.style.display="none",delay);
}

/* Auth */
onAuthStateChanged(auth,user=>{
let url=new URL(window.location.href);
let amt=url.searchParams.get("amount");

if(!user && amt){isGuest=true;}
else if(!user){window.location="login.html";return;}

let name=url.searchParams.get("name") || user?.displayName || "Guest";
let email=url.searchParams.get("email") || user?.email || "";

profileBox.innerHTML=`<b>${name}</b><br>${email}`;
profileFull.innerHTML=profileBox.innerHTML;
});

/* Section */
window.show=function(id){
if(isGuest && id!=="payment"){
window.location="login.html";
return;
}
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* Generate */
window.generatePayment=function(){

if(used){alert("Already used");return;}

let amt=amount.value;
if(!amt){alert("Enter amount");return;}

showLoader();

orderId="ORD"+Date.now();

upiLink=`upi://pay?pa=7463011305@amazonpay&pn=Karan&am=${amt}&cu=INR`;

qrcode.innerHTML="";
new QRCode(qrcode,{text:upiLink,width:200,height:200});

orderText.innerText="Order: "+orderId;

let t=60;
timer=setInterval(()=>{
t--;
timer.innerText="Expires in "+t+" sec";
if(t<=0){clearInterval(timer);alert("Expired");location.reload();}
},1000);
}

/* Pay */
window.payNow=function(){
window.location.href=upiLink;
}

/* Verify */
window.verifyUTR=function(){
if(utr.value.length<6){alert("Invalid");return;}
verified=true;
used=true;
alert("Verified");
}

/* Receipt */
window.downloadReceipt=function(){

if(!verified){alert("Verify first");return;}

let { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("Karan Payment Gateway",20,20);
doc.text("Amount: ₹"+amount.value,20,40);
doc.text("UTR: "+utr.value,20,50);

let canvas=document.querySelector("#qrcode canvas");
if(canvas){
doc.addImage(canvas.toDataURL(),"PNG",130,30,60,60);
}

doc.save("receipt.pdf");
}

/* Email change */
window.changeEmail=async function(){

let user=auth.currentUser;

try{
const cred=EmailAuthProvider.credential(user.email,password.value);
await reauthenticateWithCredential(user,cred);
await verifyBeforeUpdateEmail(user,newEmail.value);
alert("Verify email first");
}catch(e){alert(e.message);}
}

/* History */
function loadHistory(){
let h=JSON.parse(localStorage.getItem("payHistory"))||[];
historyList.innerHTML="";
h.forEach(i=>{
let d=document.createElement("div");
d.innerText=i.amount;
historyList.appendChild(d);
});
}
loadHistory();

/* Logout */
window.logout=function(){
signOut(auth).then(()=>location="login.html");
}

</script>
</body>
</html>
