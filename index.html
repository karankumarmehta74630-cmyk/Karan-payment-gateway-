<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan Payment Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

/* Topbar */
.topbar{
position:fixed;
top:0;left:0;width:100%;
background:#111827;color:#fff;
display:flex;justify-content:space-between;
padding:8px 15px;font-size:13px;z-index:1000;
}

body{
padding-top:45px;
display:flex;
min-height:100vh;
background:linear-gradient(135deg,#e0e7ff,#f8fafc);
}

/* Sidebar */
.sidebar{
width:220px;background:#111827;color:#fff;padding:20px;
}
.sidebar div{
margin:12px 0;padding:8px;border-radius:6px;cursor:pointer;
}
.sidebar div:hover{background:#2563eb}

/* Mobile */
@media(max-width:768px){
body{flex-direction:column}
.sidebar{display:flex;justify-content:space-around;width:100%}
}

/* Content */
.content{flex:1;padding:20px}

/* Card */
.card{
background:#fff;padding:20px;border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:420px;width:100%;
margin-bottom:15px;
}

/* Profile icon (top right) */
.profile-mini{
position:fixed;
top:55px;
right:15px;
width:45px;
height:45px;
border-radius:50%;
overflow:hidden;
cursor:pointer;
z-index:999;
border:2px solid #fff;
}
.profile-mini img{
width:100%;height:100%;object-fit:cover;
}

/* Profile popup */
.profile-popup{
position:fixed;
top:0;
right:-100%;
width:280px;
height:100%;
background:#fff;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:.3s;
z-index:1000;
}
.profile-popup.active{right:0}

/* Inputs */
input{
width:100%;padding:12px;margin-top:10px;
border:1px solid #ccc;border-radius:8px;
}

/* Buttons */
button{
width:100%;padding:12px;margin-top:10px;
border:none;background:#2563eb;color:#fff;
border-radius:8px;cursor:pointer;
}

/* Loader */
.loader{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#111827;
display:flex;justify-content:center;align-items:center;
z-index:9999;
}
.logo-load{
width:80px;height:80px;border-radius:50%;
background:linear-gradient(135deg,#2563eb,#9333ea);
display:flex;justify-content:center;align-items:center;
color:#fff;font-size:28px;font-weight:700;
animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg)}}
.section{display:none}
.active{display:block}
.timer{color:red}
</style>
</head>

<body>

<div class="topbar">
<div id="datetime"></div>
<div id="battery">🔋 --%</div>
</div>

<!-- Loader -->
<div class="loader" id="loader">
<div class="logo-load">KP</div>
</div>

<!-- Profile Mini Icon -->
<div class="profile-mini" onclick="toggleProfile()">
<img id="miniDP" src="https://i.imgur.com/6VBx3io.png">
</div>

<!-- Profile Popup -->
<div id="profilePopup" class="profile-popup">
<h3>Profile</h3>
<div id="profileFull"></div>

<input type="file" id="profileUpload">
<button onclick="saveProfile()">Upload DP</button>

<input id="newEmail" placeholder="New Email">
<input id="pass" placeholder="Password">
<button onclick="changeEmail()">Change Email</button>

<button onclick="logout()">Logout</button>
</div>

<!-- Sidebar -->
<div class="sidebar">
<div onclick="show('home')">Home</div>
<div onclick="show('payment')">Payment</div>
<div onclick="show('settings')">Settings</div>
</div>

<!-- Content -->
<div class="content">

<!-- HOME -->
<div id="home" class="section active">
<div class="card">
<h2>Karan Payment App</h2>
<button onclick="downloadApp()">📥 Download App</button>
<button onclick="show('payment')">Continue</button>
</div>
</div>

<!-- PAYMENT -->
<div id="payment" class="section">
<div class="card">
<h3>Payment</h3>

<input id="amount" placeholder="Enter Amount">

<button onclick="generate()">Generate QR</button>

<div id="qrcode"></div>
<p id="orderText"></p>
<p id="timer" class="timer"></p>

<button onclick="pay()">Pay Now</button>
<button onclick="copyLink()">Copy Link</button>

<input id="utr" placeholder="Enter UTR">
<button onclick="verify()">Verify</button>

<button onclick="downloadPDF()">Receipt</button>
<button onclick="shareWA()">Share WhatsApp</button>

</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="section">
<div class="card">
<h3>Settings</h3>
<input id="upiInput" placeholder="UPI ID">
<button onclick="saveUPI()">Save</button>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app=initializeApp({
apiKey:"AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
authDomain:"karanchatapp-e0b1d.firebaseapp.com"
});
const auth=getAuth(app);

let userObj=null;
let upiLink="", orderId="", timer, time=60;

/* Time */
setInterval(()=>{
let d=new Date();
datetime.innerText=d.toLocaleDateString()+" | "+d.toLocaleTimeString();
},1000);

/* Battery */
navigator.getBattery?.().then(b=>{
function u(){battery.innerText="🔋 "+Math.round(b.level*100)+"%"}
u();b.addEventListener("levelchange",u);
});

/* Loader */
setTimeout(()=>loader.style.display="none",3000);

/* Auth */
onAuthStateChanged(auth,user=>{
if(!user){location="login.html";return;}
userObj=user;

let dp=user.photoURL||localStorage.getItem("dp")||"https://i.imgur.com/6VBx3io.png";

miniDP.src=dp;
profileFull.innerHTML=`<img src="${dp}" width="60"><br>${user.displayName}<br>${user.email}`;
});

/* Profile Toggle */
window.toggleProfile=function(){
profilePopup.classList.toggle("active");
}

/* Download App */
window.downloadApp=function(){
window.open("https://www.webtonative.com/api/v1/demo/download/69dbb415960066cc79c1d31a/ANDROID","_blank");
}

/* Generate */
window.generate=function(){
let amt=amount.value;
if(!amt)return alert("Enter amount");

orderId="ORD"+Date.now();

let upi=localStorage.getItem("upi")||"7463011305@amazonpay";

upiLink=`upi://pay?pa=${upi}&pn=Karan&am=${amt}&cu=INR`;

qrcode.innerHTML="";
new QRCode(qrcode,{text:upiLink,width:200,height:200});

orderText.innerText="Order: "+orderId;

time=60;
timer=setInterval(()=>{
time--;
timer.innerText="Expires "+time;
if(time<=0)clearInterval(timer);
},1000);
}

/* Pay */
window.pay=()=>location.href=upiLink;

/* Copy */
window.copyLink=()=>{
navigator.clipboard.writeText(location.href+"?amount="+amount.value);
alert("Copied");
}

/* Verify */
window.verify=()=>{
if(utr.value.length<6)return alert("Invalid");
alert("Verified");
}

/* PDF */
window.downloadPDF=function(){
let {jsPDF}=window.jspdf;
let doc=new jsPDF();

doc.text("Karan Payment",20,20);
doc.text("Amount: ₹"+amount.value,20,40);
doc.text("UTR: "+utr.value,20,50);

let c=document.querySelector("#qrcode canvas");
if(c)doc.addImage(c.toDataURL(),"PNG",120,30,60,60);

doc.save("receipt.pdf");
}

/* WhatsApp */
window.shareWA=function(){
let num=prompt("Enter number");
window.open("https://wa.me/"+num+"?text=Paid ₹"+amount.value);
}

/* UPI */
window.saveUPI=()=>{
localStorage.setItem("upi",upiInput.value);
alert("Saved");
}

/* Profile Upload */
window.saveProfile=function(){
let f=profileUpload.files[0];
let r=new FileReader();
r.onload=()=>{localStorage.setItem("dp",r.result);location.reload();}
r.readAsDataURL(f);
}

/* Section */
window.show=id=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* Logout */
window.logout=()=>signOut(auth).then(()=>location="login.html");

</script>
</body>
</html>
