<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan Payment Gateway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{display:flex;min-height:100vh;background:#f1f5f9}
.sidebar{width:220px;background:#111827;color:#fff;padding:20px}
.sidebar div{margin:12px 0;cursor:pointer}
.content{flex:1;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.1);max-width:420px;width:100%}
.profile{display:flex;gap:10px;align-items:center}
.profile img{width:50px;height:50px;border-radius:50%}
input{width:100%;padding:10px;margin-top:10px;border:1px solid #ccc;border-radius:6px}
button{width:100%;padding:10px;margin-top:10px;border:none;background:#2563eb;color:#fff;border-radius:6px;cursor:pointer}
.section{display:none}
.active{display:block}
.timer{color:red;margin-top:5px}
.loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;display:flex;justify-content:center;align-items:center;color:#fff;display:none}
</style>
</head>

<body>

<div class="loader" id="loader">Processing...</div>

<div class="sidebar">
<div onclick="show('payment')">Payment</div>
<div onclick="show('profile')">Profile</div>
<div onclick="logout()">Logout</div>
</div>

<div class="content">

<div id="payment" class="section active">
<div class="card">

<h3>Payment</h3>

<div id="profileBox" class="profile"></div>

<input id="amount" placeholder="Enter Amount">

<button onclick="generatePayment()">Generate Payment</button>

<div id="qrcode"></div>
<p id="orderText"></p>
<p id="timer" class="timer"></p>

<button onclick="payNow()">Pay Now</button>

<input id="utr" placeholder="Enter UTR Number">

<button onclick="verifyUTR()">Verify Payment</button>

<button onclick="downloadReceipt()">Download Receipt</button>

</div>
</div>

<div id="profile" class="section">
<div class="card">
<h3>Profile</h3>
<div id="profileFull"></div>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
authDomain:"karanchatapp-e0b1d.firebaseapp.com",
projectId:"karanchatapp-e0b1d",
appId:"1:992252113506:web:c55091651550918a43173b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let upiLink="", orderId="", timer, time=60;
let isGuest=false;
let used=false;
let verified=false;

/* Loader */
function load3sec(){
loader.style.display="flex";
setTimeout(()=>loader.style.display="none",3000);
}

/* Section */
window.show=function(id){
if(isGuest && id!=="payment"){
window.location="login.html";
return;
}
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* Auth + Guest */
onAuthStateChanged(auth,user=>{

let url=new URL(window.location.href);
let amt=url.searchParams.get("amount");

if(!user && amt){
isGuest=true;
}else if(!user){
window.location="login.html";
return;
}

let name=url.searchParams.get("name") || user?.displayName || "Guest";
let email=url.searchParams.get("email") || user?.email || "";

profileBox.innerHTML=`<div><b>${name}</b><br>${email}</div>`;
profileFull.innerHTML=profileBox.innerHTML;

});

/* Generate */
window.generatePayment=function(){

if(used){
alert("This link already used");
return;
}

let amt=amount.value;
if(!amt){alert("Enter amount");return;}

load3sec();

orderId="ORD"+Date.now();

upiLink=`upi://pay?pa=7463011305@amazonpay&pn=Karan&am=${amt}&cu=INR`;

qrcode.innerHTML="";
new QRCode(qrcode,{text:upiLink,width:200,height:200});

orderText.innerText="Order: "+orderId;

startTimer();
}

/* Timer */
function startTimer(){
time=60;
clearInterval(timer);

timer=setInterval(()=>{
time--;
timer.innerText="Expires in "+time+" sec";

if(time<=0){
clearInterval(timer);
alert("Link expired");
location.reload();
}
},1000);
}

/* Pay */
window.payNow=function(){
window.location.href=upiLink;
}

/* Verify UTR */
window.verifyUTR=function(){

let val=utr.value;

if(!val || val.length<6){
alert("Invalid UTR");
return;
}

verified=true;
used=true;

alert("Payment Verified");
}

/* Receipt */
window.downloadReceipt=function(){

if(!verified){
alert("Verify payment first");
return;
}

let { jsPDF } = window.jspdf;
let doc=new jsPDF();

let url=new URL(window.location.href);

let name=url.searchParams.get("name") || "User";
let email=url.searchParams.get("email") || "";

doc.setFontSize(18);
doc.text("Karan Payment Gateway",20,20);

doc.setFontSize(12);
doc.text("Payment Receipt",20,30);
doc.line(20,32,190,32);

doc.text("Name: "+name,20,45);
doc.text("Email: "+email,20,55);
doc.text("Amount: ₹"+amount.value,20,65);
doc.text("Order ID: "+orderId,20,75);
doc.text("UTR: "+utr.value,20,85);
doc.text("Date: "+new Date().toLocaleString(),20,95);

doc.text("Status: SUCCESS",20,110);

let canvas=document.querySelector("#qrcode canvas");
if(canvas){
let img=canvas.toDataURL();
doc.addImage(img,"PNG",130,40,60,60);
}

doc.save("Receipt_"+orderId+".pdf");
}

/* Auto load */
window.onload=function(){
let url=new URL(window.location.href);
let amt=url.searchParams.get("amount");

if(amt){
amount.value=amt;
generatePayment();
}
}

/* Logout */
window.logout=function(){
signOut(auth).then(()=>window.location="login.html");
}

</script>

</body>
</html>
