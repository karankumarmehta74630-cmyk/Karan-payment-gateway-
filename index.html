<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan Payment Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a);
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
color:#fff;
}

.container{max-width:450px;width:100%}

.card{
background:#ffffff10;
backdrop-filter:blur(20px);
border-radius:20px;
padding:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.header{
text-align:center;
font-size:18px;
font-weight:600;
margin-bottom:15px;
}

.profile{
display:flex;
align-items:center;
gap:10px;
background:#ffffff20;
padding:10px;
border-radius:12px;
margin-bottom:15px;
}

.profile img{
width:45px;
height:45px;
border-radius:50%;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#6366f1;
color:#fff;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{transform:scale(1.05)}

#qrSection{
display:none;
text-align:center;
margin-top:15px;
animation:slide .5s ease;
}

@keyframes slide{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.timer{
color:#ff4d4d;
font-weight:600;
margin-top:8px;
}

.pay-btn{
background:#22c55e;
}

.logout{
background:#ef4444;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="header">Karan Payment Gateway</div>

<div class="profile" id="profileBox"></div>

<input type="number" id="amount" placeholder="Enter Amount ₹">

<button onclick="startPayment()">Generate QR</button>

<div id="qrSection">

<div id="qrcode"></div>

<p id="orderText"></p>
<p id="amountText"></p>
<p class="timer" id="timer"></p>

<button class="pay-btn" onclick="openUPI()">Pay Now</button>

<button onclick="downloadQR()">Download QR</button>
<button onclick="shareQR()">Share</button>

</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
  authDomain: "karanchatapp-e0b1d.firebaseapp.com",
  projectId: "karanchatapp-e0b1d",
  appId: "1:992252113506:web:c55091651550918a43173b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let upiLink="", timer, timeLeft=60, orderId="";

onAuthStateChanged(auth,user=>{
if(!user){
window.location.href="login.html";
}else{
document.getElementById("profileBox").innerHTML=
`<img src="${user.photoURL || 'https://i.imgur.com/6VBx3io.png'}">
<div>
<b>${user.displayName || "User"}</b><br>
${user.email}
</div>`;
}
});

window.logout=function(){
signOut(auth).then(()=>window.location.href="login.html");
}

window.startPayment=function(){

let amt=amount.value;
if(!amt || amt<=0){alert("Enter valid amount");return;}

orderId="ORD"+Date.now();

document.getElementById("qrSection").style.display="block";
document.getElementById("orderText").innerText="Order ID: "+orderId;
document.getElementById("amountText").innerText="Amount: ₹"+amt;

upiLink=`upi://pay?pa=7463011305-14@ybl&pn=Karan&am=${amt}&cu=INR&tn=Order ${orderId}`;

document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),{
text:upiLink,
width:200,
height:200
});

startTimer();
}

function startTimer(){
timeLeft=60;
updateTimer();

clearInterval(timer);

timer=setInterval(()=>{
timeLeft--;
updateTimer();

if(timeLeft<=0){
clearInterval(timer);
document.getElementById("timer").innerText="Expired";
}
},1000);
}

function updateTimer(){
document.getElementById("timer").innerText="Expires in "+timeLeft+" sec";
}

window.openUPI=function(){
window.location.href=upiLink;
}

window.downloadQR=function(){
let canvas=document.querySelector("#qrcode canvas");
let link=document.createElement("a");
link.href=canvas.toDataURL();
link.download="QR.png";
link.click();
}

window.shareQR=async function(){

let canvas=document.querySelector("#qrcode canvas");
let blob=await new Promise(r=>canvas.toBlob(r));
let file=new File([blob],"QR.png",{type:"image/png"});

if(navigator.canShare && navigator.canShare({files:[file]})){
navigator.share({files:[file]});
}else{
alert("Sharing not supported");
}
}

</script>

</body>
</html>
