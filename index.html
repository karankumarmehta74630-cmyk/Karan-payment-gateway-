<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
display:flex;
min-height:100vh;
background:#f1f5f9;
}

/* Sidebar */
.sidebar{
width:200px;
background:#111827;
color:#fff;
padding:20px;
}

.sidebar h2{margin-bottom:20px}

.sidebar div{
margin:10px 0;
cursor:pointer;
padding:8px;
border-radius:5px;
}

.sidebar div:hover{
background:#2563eb;
}

/* Content */
.content{
flex:1;
padding:20px;
}

/* Sections */
.section{
display:none;
animation:fade .4s ease;
}

.active{display:block}

@keyframes fade{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

/* Cards */
.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:400px;
}

/* Profile */
.profile{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.profile img{
width:60px;
height:60px;
border-radius:50%;
}

/* Input */
input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

/* Buttons */
button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:8px;
cursor:pointer;
}

/* QR */
#qrcode{text-align:center;margin-top:10px}
.timer{color:red;margin-top:5px}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
<h2>Karan</h2>
<div onclick="show('profile')">Profile</div>
<div onclick="show('payment')">Payment</div>
<div onclick="show('email')">Change Gmail</div>
<div onclick="logout()">Logout</div>
</div>

<!-- Content -->
<div class="content">

<!-- PROFILE -->
<div id="profile" class="section active">
<div class="card">

<h3>Profile</h3>

<div class="profile" id="profileBox"></div>

<input id="name" placeholder="Update Name">
<button onclick="updateProfile()">Update Profile</button>

</div>
</div>

<!-- PAYMENT -->
<div id="payment" class="section">
<div class="card">

<h3>Payment</h3>

<input id="amount" placeholder="Enter Amount">

<button onclick="generateQR()">Generate QR</button>

<div id="qrcode"></div>
<p id="timer" class="timer"></p>

<button onclick="payNow()">Pay Now</button>

</div>
</div>

<!-- EMAIL -->
<div id="email" class="section">
<div class="card">

<h3>Change Gmail</h3>

<input id="newEmail" placeholder="New Email">
<input id="password" placeholder="Password">

<button onclick="changeEmail()">Update Email</button>

</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updateProfile, EmailAuthProvider, reauthenticateWithCredential, updateEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
  authDomain: "karanchatapp-e0b1d.firebaseapp.com",
  projectId: "karanchatapp-e0b1d",
  appId: "1:992252113506:web:c55091651550918a43173b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let upiLink="", timer, time=60;

/* Section switch */
window.show=function(sec){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(sec).classList.add("active");
}

/* Auth */
onAuthStateChanged(auth,user=>{
if(!user){
window.location="login.html";
}else{
profileBox.innerHTML=`
<img src="${user.photoURL || 'https://i.imgur.com/6VBx3io.png'}">
<div><b>${user.displayName || "User"}</b><br>${user.email}</div>`;
name.value=user.displayName || "";
}
});

window.logout=function(){
signOut(auth).then(()=>window.location="login.html");
}

/* Update Profile */
window.updateProfile=async function(){
let user=auth.currentUser;
await updateProfile(user,{displayName:name.value});
alert("Updated");
}

/* Payment */
window.generateQR=function(){
let amt=amount.value;
if(!amt){alert("Enter amount");return;}

upiLink=`upi://pay?pa=merchant@upi&pn=Karan&am=${amt}&cu=INR`;

qrcode.innerHTML="";
new QRCode(qrcode,{text:upiLink,width:200,height:200});

startTimer();
}

function startTimer(){
time=60;
clearInterval(timer);

timer=setInterval(()=>{
time--;
timerText.innerText="Expires in "+time+" sec";
if(time<=0){
clearInterval(timer);
timerText.innerText="Expired";
}
},1000);
}

window.payNow=function(){
window.location.href=upiLink;
}

/* Change Email */
window.changeEmail=async function(){
let user=auth.currentUser;

try{
const cred=EmailAuthProvider.credential(user.email,password.value);
await reauthenticateWithCredential(user,cred);
await updateEmail(user,newEmail.value);
alert("Email Updated");
}catch(e){
alert(e.message);
}
}

</script>

</body>
</html>
