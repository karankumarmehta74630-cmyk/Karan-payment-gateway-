<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan Payment Gateway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
display:flex;
min-height:100vh;
background:linear-gradient(135deg,#e0e7ff,#f8fafc);
}

/* Sidebar */
.sidebar{
width:220px;
background:#111827;
color:#fff;
padding:20px;
}

.sidebar div{
margin:12px 0;
cursor:pointer;
padding:8px;
border-radius:6px;
transition:.3s;
}
.sidebar div:hover{background:#2563eb}

/* Mobile */
@media(max-width:768px){
body{flex-direction:column}
.sidebar{display:flex;justify-content:space-around;width:100%}
}

/* Content */
.content{flex:1;padding:20px}

/* Card */
.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:420px;width:100%;
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* Profile */
.profile{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}
.profile img{
width:50px;height:50px;border-radius:50%;
}

/* Inputs */
input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

/* Buttons */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:8px;
cursor:pointer;
}

/* Loader */
.loader{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#000a;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
display:none;
}

.section{display:none}
.active{display:block}

.timer{color:red;margin-top:5px}
</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<div class="sidebar">
<div onclick="show('payment')">Payment</div>
<div onclick="show('history')">History</div>
<div onclick="show('profile')">Profile</div>
<div onclick="logout()">Logout</div>
</div>

<div class="content">

<!-- PAYMENT -->
<div id="payment" class="section active">
<div class="card">

<h3>Karan Payment Gateway</h3>

<div id="profileBox" class="profile"></div>

<input id="amount" placeholder="Enter Amount">

<button onclick="generate()">Generate QR</button>

<div id="qrcode"></div>
<p id="orderText"></p>
<p id="timer" class="timer"></p>

<button onclick="pay()">Pay Now</button>
<button onclick="copyLink()">Copy Payment Link</button>

<input id="utr" placeholder="Enter UTR">
<button onclick="verify()">Verify Payment</button>

<button onclick="downloadReceipt()">Download Receipt</button>

</div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
<div class="card">
<h3>Profile</h3>
<div id="profileFull"></div>
</div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<div class="card">
<h3>History</h3>
<div id="historyList"></div>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
authDomain:"karanchatapp-e0b1d.firebaseapp.com",
projectId:"karanchatapp-e0b1d",
appId:"1:992252113506:web:c55091651550918a43173b"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

let currentUser=null;
let upiLink="", orderId="", timer, time=60;
let paymentLink="";
let isGuest=false;

/* Loader */
function load(){
loader.style.display="flex";
setTimeout(()=>loader.style.display="none",3000);
}

/* Auth */
onAuthStateChanged(auth,user=>{

currentUser=user;

let url=new URL(window.location.href);
let amt=url.searchParams.get("amount");

if(!user && amt){
isGuest=true;
}else if(!user){
window.location="login.html";
return;
}

let name=user?.displayName || url.searchParams.get("name") || "Guest";
let email=user?.email || url.searchParams.get("email") || "";

let dp=user?.photoURL || "https://i.imgur.com/6VBx3io.png";

profileBox.innerHTML=`
<img src="${dp}">
<div><b>${name}</b><br>${email}</div>
`;

profileFull.innerHTML=profileBox.innerHTML;

});

/* Generate */
window.generate=function(){

let amt=amount.value;
if(!amt){alert("Enter amount");return;}

load();

orderId="ORD"+Date.now();

upiLink=`upi://pay?pa=7463011305@amazonpay&pn=Karan&am=${amt}&cu=INR`;

paymentLink=location.origin+location.pathname+
`?amount=${amt}&name=${encodeURIComponent(currentUser?.displayName||"User")}&email=${encodeURIComponent(currentUser?.email||"")}`;

qrcode.innerHTML="";
new QRCode(qrcode,{text:upiLink,width:220,height:220});

orderText.innerText="Order: "+orderId;

startTimer();
}

/* Timer */
function startTimer(){
time=60;
clearInterval(timer);

timer=setInterval(()=>{
time--;
timer.innerText="Expires in "+time+" sec";
if(time<=0){
clearInterval(timer);
timer.innerText="Expired";
}
},1000);
}

/* Pay */
window.pay=function(){
window.location.href=upiLink;
}

/* Copy */
window.copyLink=function(){

if(isGuest){
alert("Login required");
window.location="login.html";
return;
}

navigator.clipboard.writeText(paymentLink);
alert("Link Copied");
}

/* Verify */
window.verify=function(){
if(utr.value.length<6){
alert("Invalid UTR");
return;
}
alert("Payment Verified");
}

/* Receipt */
window.downloadReceipt=function(){

let { jsPDF }=window.jspdf;
let doc=new jsPDF();

doc.text("Karan Payment Gateway",20,20);
doc.text("Receipt",20,30);

doc.text("Name: "+(currentUser?.displayName||"User"),20,45);
doc.text("Email: "+(currentUser?.email||""),20,55);
doc.text("Amount: ₹"+amount.value,20,65);
doc.text("UTR: "+utr.value,20,75);

let canvas=document.querySelector("#qrcode canvas");
if(canvas){
doc.addImage(canvas.toDataURL(),"PNG",130,40,60,60);
}

doc.save("receipt.pdf");
}

/* Sections */
window.show=function(id){
if(isGuest && id!=="payment"){
window.location="login.html";
return;
}
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* History */
function loadHistory(){
let h=JSON.parse(localStorage.getItem("hist"))||[];
historyList.innerHTML="";
h.forEach(i=>{
let d=document.createElement("div");
d.innerText=i;
historyList.appendChild(d);
});
}
loadHistory();

/* Auto */
window.onload=function(){
let url=new URL(location.href);
let amt=url.searchParams.get("amount");

if(amt){
amount.value=amt;
generate();
}
}

/* Logout */
window.logout=function(){
signOut(auth).then(()=>location="login.html");
}

</script>

</body>
</html>
