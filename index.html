<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan Payment Gateway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
display:flex;
min-height:100vh;
background:#f1f5f9;
}

/* Sidebar */
.sidebar{
width:220px;
background:#111827;
color:#fff;
padding:20px;
}

.sidebar div{
margin:12px 0;
cursor:pointer;
}

/* Mobile */
@media(max-width:768px){
body{flex-direction:column}
.sidebar{width:100%;display:flex;justify-content:space-around}
}

/* Content */
.content{flex:1;padding:20px}

/* Card */
.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:420px;
width:100%;
}

/* Profile */
.profile{display:flex;gap:10px;align-items:center}
.profile img{width:50px;height:50px;border-radius:50%}

/* Inputs */
input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

/* Buttons */
button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:6px;
cursor:pointer;
}

/* Sections */
.section{display:none}
.active{display:block}

/* Timer */
.timer{color:red;margin-top:5px}

/* Loader */
.loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000a;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
display:none;
}
</style>
</head>

<body>

<div class="loader" id="loader">Processing...</div>

<!-- Sidebar -->
<div class="sidebar">
<div onclick="show('payment')">Payment</div>
<div onclick="show('history')">History</div>
<div onclick="show('profile')">Profile</div>
<div onclick="logout()">Logout</div>
</div>

<!-- Content -->
<div class="content">

<!-- PAYMENT -->
<div id="payment" class="section active">
<div class="card">

<h3>Payment</h3>

<input id="amount" placeholder="Enter Amount">

<button onclick="generatePayment()">Generate Payment</button>

<div id="qrcode"></div>
<p id="orderText"></p>
<p id="timer" class="timer"></p>

<button onclick="payNow()">Pay Now</button>
<button onclick="copyLink()">Copy Payment Link</button>
<button onclick="markSuccess()">Payment Success</button>
<button onclick="downloadReceipt()">Download Receipt</button>

</div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<div class="card">
<h3>Payment History</h3>
<div id="historyList"></div>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
<div class="card">
<h3>Profile</h3>
<div id="profileBox" class="profile"></div>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBWfnQ9KFDWA5V9_VfqQdWd-vL-psdcqTA",
authDomain:"karanchatapp-e0b1d.firebaseapp.com",
projectId:"karanchatapp-e0b1d",
appId:"1:992252113506:web:c55091651550918a43173b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let upiLink="", orderId="", timer, time=60;
let paymentLink="";

/* Loader */
function load3sec(){
loader.style.display="flex";
setTimeout(()=>loader.style.display="none",3000);
}

/* Section */
window.show=function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* Auth */
onAuthStateChanged(auth,user=>{
if(!user){window.location="login.html";}
else{
profileBox.innerHTML=`
<img src="${user.photoURL || 'https://i.imgur.com/6VBx3io.png'}">
<div><b>${user.displayName}</b><br>${user.email}</div>`;
}
});

/* Generate Payment */
window.generatePayment=function(){

let amt=amount.value;
if(!amt){alert("Enter amount");return;}

load3sec();

orderId="ORD"+Date.now();

upiLink=`upi://pay?pa=7463011305@amazonpay&pn=Karan%20Payment&am=${amt}&cu=INR`;

paymentLink=window.location.origin + window.location.pathname + "?amount="+amt;

qrcode.innerHTML="";
new QRCode(qrcode,{text:upiLink,width:200,height:200});

orderText.innerText="Order: "+orderId;

startTimer();
}

/* Timer */
function startTimer(){
time=60;
clearInterval(timer);

timer=setInterval(()=>{
time--;
timer.innerText="Expires in "+time+" sec";
if(time<=0){
clearInterval(timer);
timer.innerText="Expired";
}
},1000);
}

/* Pay */
window.payNow=function(){
if(!upiLink){alert("Generate first");return;}
window.location.href=upiLink;
}

/* Copy Link */
window.copyLink=function(){
navigator.clipboard.writeText(paymentLink);
alert("Link Copied");
}

/* Success */
window.markSuccess=function(){

let history=JSON.parse(localStorage.getItem("payHistory"))||[];

history.push({
order:orderId,
amount:amount.value,
date:new Date().toLocaleString()
});

localStorage.setItem("payHistory",JSON.stringify(history));

alert("Payment Saved");

loadHistory();
}

/* History */
function loadHistory(){
let h=JSON.parse(localStorage.getItem("payHistory"))||[];
historyList.innerHTML="";
h.reverse().forEach(i=>{
let div=document.createElement("div");
div.innerText=`₹${i.amount} | ${i.order}`;
historyList.appendChild(div);
});
}
loadHistory();

/* Receipt with QR */
window.downloadReceipt=function(){

let user=auth.currentUser;
if(!user){alert("Login required");return;}

let { jsPDF } = window.jspdf;

let doc=new jsPDF();

let name=user.displayName || "User";
let email=user.email;
let amt=amount.value;
let date=new Date().toLocaleString();

// Title
doc.setFontSize(18);
doc.text("Karan Payment Gateway",20,20);

doc.setFontSize(12);
doc.text("Payment Receipt",20,30);
doc.line(20,32,190,32);

// Details
doc.text("Name: "+name,20,45);
doc.text("Email: "+email,20,55);
doc.text("Amount: ₹"+amt,20,65);
doc.text("Order ID: "+orderId,20,75);
doc.text("Date: "+date,20,85);

doc.text("Status: SUCCESS",20,100);

// QR IMAGE
let qrCanvas=document.querySelector("#qrcode canvas");

if(qrCanvas){
let imgData=qrCanvas.toDataURL("image/png");
doc.addImage(imgData,"PNG",130,40,60,60);
}

// Footer
doc.setFontSize(10);
doc.text("Thank you for using Karan Payment Gateway",20,120);

// Download
doc.save("Receipt_"+orderId+".pdf");

}

/* Auto amount from link */
window.onload=function(){
let url=new URL(window.location.href);
let amt=url.searchParams.get("amount");
if(amt){
amount.value=amt;
generatePayment();
}
}

/* Logout */
window.logout=function(){
signOut(auth).then(()=>window.location="login.html");
}

</script>

</body>
</html>
